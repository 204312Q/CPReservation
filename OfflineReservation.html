<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 16px;
      color: #333;
      background: #eef1f5;
    }

    h2 {
      margin-top: 0;
      font-size: 18px;
    }

    label {
      display: block;
      margin: 10px 0 4px;
      font-size: 13px;
      font-weight: bold;
    }

    input,
    textarea,
    select {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      background: #ffffff;
      color: #333;
      height: 38px;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
    }

    textarea {
      min-height: 76px;
      height: auto;
      resize: vertical;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row > div {
      flex: 1;
      min-width: 0;
    }

    .select-wrap {
      position: relative;
    }

    .select-wrap select {
      padding-right: 34px;
    }

    .select-wrap::after {
      content: "▾";
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #666;
      font-size: 14px;
    }

    button {
      margin-top: 14px;
      width: 100%;
      padding: 11px 12px;
      border: 0;
      border-radius: 8px;
      background: #a80000;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .msg {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
      white-space: pre-wrap;
    }

    .msg.success {
      display: block;
      background: #e7f7ee;
      color: #1f6b3b;
    }

    .msg.error {
      display: block;
      background: #fdeaea;
      color: #8b1e1e;
    }

    .hint {
      margin-top: 6px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>

<body>
  <h2>New Offline Reservation</h2>

  <form id="offlineForm">
    <div class="row">
      <div>
        <label>First Name</label>
        <input name="firstName" required>
      </div>
      <div>
        <label>Last Name</label>
        <input name="lastName" required>
      </div>
    </div>

    <label>Email</label>
    <input name="email" type="email">

    <label>Phone</label>
    <input name="phone" required>

    <div class="row">
      <div>
        <label>Date</label>
        <input name="date" id="dateInput" type="date" required>
      </div>
      <div>
        <label>Time</label>
        <div class="select-wrap">
          <select name="time" id="timeSelect" required>
            <option value="">Select a date first</option>
          </select>
        </div>
      </div>
    </div>

    <div>
      <label>Total Pax</label>
      <input name="pax" id="paxInput" type="number" min="1" max="10" value="1" required>
      <div class="hint">Allowed range: 1 to 10 pax</div>
    </div>

    <label>Additional Request</label>
    <textarea name="notes"></textarea>

    <button type="submit" id="submitBtn">Create Reservation</button>
  </form>

  <div id="msg" class="msg"></div>

  <script>
    const form = document.getElementById("offlineForm");
    const submitBtn = document.getElementById("submitBtn");
    const msg = document.getElementById("msg");
    const dateInput = document.getElementById("dateInput");
    const timeSelect = document.getElementById("timeSelect");
    const paxInput = document.getElementById("paxInput");

    function showMessage(text, type) {
      msg.textContent = text;
      msg.className = "msg " + type;
    }

    function clearMessage() {
      msg.textContent = "";
      msg.className = "msg";
    }

    function setTimeOptions(times) {
      timeSelect.innerHTML = "";

      if (!times || !times.length) {
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "No available times";
        timeSelect.appendChild(opt);
        return;
      }

      const placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = "Select a time";
      timeSelect.appendChild(placeholder);

      times.forEach(function (time) {
        const opt = document.createElement("option");
        opt.value = time;
        opt.textContent = time;
        timeSelect.appendChild(opt);
      });
    }

    function validateForm(data) {
      const pax = Number(data.pax || 0);
      if (pax < 1) return "Total pax must be at least 1.";
      if (pax > 10) return "Maximum allowed is 10 pax.";

      const digits = String(data.phone || "").replace(/\D/g, "");
      if (digits.length < 8) return "Phone number looks too short.";

      if (!data.date) return "Please select a date.";
      if (!data.time) return "Please select a time.";

      return null;
    }

    dateInput.addEventListener("change", function () {
      const date = dateInput.value;
      clearMessage();

      timeSelect.innerHTML = '<option value="">Loading...</option>';

      if (!date) {
        timeSelect.innerHTML = '<option value="">Select a date first</option>';
        return;
      }

      google.script.run
        .withSuccessHandler(function (times) {
          setTimeOptions(times);
        })
        .withFailureHandler(function (err) {
          timeSelect.innerHTML = '<option value="">Unable to load times</option>';
          showMessage(err.message || "Failed to load available times.", "error");
        })
        .getAvailableTimesForSidebar(date);
    });

    paxInput.addEventListener("input", function () {
      const value = Number(paxInput.value || 0);
      if (value > 10) paxInput.value = 10;
      if (value < 1 && paxInput.value !== "") {
        // leave user typing alone unless they submit
      }
    });

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      submitBtn.disabled = true;
      clearMessage();

      const data = Object.fromEntries(new FormData(form).entries());
      data.pax = Number(data.pax || 0);

      const validationError = validateForm(data);
      if (validationError) {
        submitBtn.disabled = false;
        showMessage(validationError, "error");
        return;
      }

      google.script.run
        .withSuccessHandler(function (res) {
          submitBtn.disabled = false;
          showMessage("Reservation created. ID: " + res.reservationId, "success");
          form.reset();
          paxInput.value = 1;
          timeSelect.innerHTML = '<option value="">Select a date first</option>';
        })
        .withFailureHandler(function (err) {
          submitBtn.disabled = false;
          showMessage(err.message || "Something went wrong.", "error");
        })
        .createOfflineReservation(data);
    });
  </script>
</body>

</html>
