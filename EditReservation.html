<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 16px;
      color: #333;
      background: #eef1f5;
    }

    h2 {
      margin-top: 0;
      font-size: 18px;
    }

    label {
      display: block;
      margin: 10px 0 4px;
      font-size: 13px;
      font-weight: bold;
    }

    input,
    textarea,
    select {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      background: #ffffff;
      color: #333;
      height: 40px;
    }

    textarea {
      min-height: 80px;
      height: auto;
      resize: vertical;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row > div {
      flex: 1;
    }

    button {
      margin-top: 14px;
      width: 100%;
      padding: 11px;
      border: 0;
      border-radius: 8px;
      background: #a80000;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .cancel-btn {
      background: #555;
      margin-top: 8px;
    }

    .msg {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }

    .msg.success {
      display: block;
      background: #e7f7ee;
      color: #1f6b3b;
    }

    .msg.error {
      display: block;
      background: #fdeaea;
      color: #8b1e1e;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <h2>Edit Reservation</h2>

  <label>Reservation ID or Phone</label>
  <input id="searchValue">
  <button type="button" id="loadBtn">Load Reservation</button>

  <div id="formWrap" class="hidden">
    <div id="reservationInfo"></div>

    <form id="editForm">
      <input type="hidden" name="rowNumber" id="rowNumber">

      <div class="row">
        <div>
          <label>First Name</label>
          <input name="firstName" id="firstName" required>
        </div>
        <div>
          <label>Last Name</label>
          <input name="lastName" id="lastName" required>
        </div>
      </div>

      <label>Email</label>
      <input name="email" id="email">

      <label>Phone</label>
      <input name="phone" id="phone" required>

      <label>Status</label>
      <select name="status" id="status">
        <option value="PENDING">PENDING</option>
        <option value="CONFIRMED">CONFIRMED</option>
        <option value="DEPARTED">DEPARTED</option>
        <option value="NO-SHOW">NO-SHOW</option>
        <option value="CANCELLED">CANCELLED</option>
      </select>

      <div class="row">
        <div>
          <label>Date</label>
          <input name="date" id="dateInput" type="date" required>
        </div>
        <div>
          <label>Time</label>
          <select name="time" id="timeSelect" required></select>
        </div>
      </div>

      <!-- ✅ REPLACED -->
      <label>Total Pax</label>
      <input name="pax" id="pax" type="number" min="1" max="10" required>

      <label>Additional Request</label>
      <textarea name="notes" id="notes"></textarea>

      <button type="submit" id="saveBtn">Save Changes</button>
      <button type="button" id="cancelBtn" class="cancel-btn">Cancel Reservation</button>
    </form>
  </div>

  <div id="msg" class="msg"></div>

  <script>
    const loadBtn = document.getElementById("loadBtn");
    const saveBtn = document.getElementById("saveBtn");
    const searchValue = document.getElementById("searchValue");
    const formWrap = document.getElementById("formWrap");
    const editForm = document.getElementById("editForm");
    const msg = document.getElementById("msg");
    const reservationInfo = document.getElementById("reservationInfo");
    const cancelBtn = document.getElementById("cancelBtn");

    function showMessage(text, type) {
      msg.textContent = text;
      msg.className = "msg " + type;
    }

    function clearMessage() {
      msg.className = "msg";
      msg.textContent = "";
    }

    function setTimeOptions(selectedValue) {
      const times = [
        "11:00","11:30","12:00","12:30","13:00","13:30","14:00",
        "17:30","18:00","18:30","19:00","19:30","20:00","20:30","21:00"
      ];

      const select = document.getElementById("timeSelect");
      select.innerHTML = "";

      times.forEach(t => {
        const opt = document.createElement("option");
        opt.value = t;
        opt.textContent = t;
        if (t === selectedValue) opt.selected = true;
        select.appendChild(opt);
      });
    }

    loadBtn.addEventListener("click", function () {
      clearMessage();
      loadBtn.disabled = true;

      google.script.run
        .withSuccessHandler(function (res) {
          loadBtn.disabled = false;

          if (!res || !res.reservation) {
            showMessage("Reservation not found.", "error");
            return;
          }

          const r = res.reservation;

          document.getElementById("rowNumber").value = res.rowNumber;
          document.getElementById("firstName").value = r.firstName;
          document.getElementById("lastName").value = r.lastName;
          document.getElementById("email").value = r.email;
          document.getElementById("phone").value = r.phone;
          document.getElementById("status").value = r.status;
          document.getElementById("dateInput").value = r.date;

          // ✅ FIXED
          document.getElementById("pax").value = r.pax || 0;

          document.getElementById("notes").value = r.notes || "";

          reservationInfo.textContent = "Reservation ID: " + r.id;
          formWrap.classList.remove("hidden");

          setTimeOptions(r.time);
        })
        .withFailureHandler(function (err) {
          loadBtn.disabled = false;
          showMessage(err.message, "error");
        })
        .findReservationForStaffEdit(searchValue.value);
    });

    editForm.addEventListener("submit", function (e) {
      e.preventDefault();
      clearMessage();
      saveBtn.disabled = true;

      const data = Object.fromEntries(new FormData(editForm).entries());
      data.pax = Number(data.pax || 0);

      google.script.run
        .withSuccessHandler(function (res) {
          saveBtn.disabled = false;
          showMessage(res.message, "success");
        })
        .withFailureHandler(function (err) {
          saveBtn.disabled = false;
          showMessage(err.message, "error");
        })
        .updateReservationByStaff(data);
    });

    cancelBtn.addEventListener("click", function () {
      const confirmCancel = confirm("Cancel this reservation?");
      if (!confirmCancel) return;

      const rowNumber = document.getElementById("rowNumber").value;

      google.script.run
        .withSuccessHandler(function (res) {
          showMessage(res.message, "success");
          formWrap.classList.add("hidden");
        })
        .withFailureHandler(function (err) {
          showMessage(err.message, "error");
        })
        .cancelReservationByStaff(rowNumber);
    });
  </script>
</body>
</html>
