<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 16px;
            color: #333;
            background: #eef1f5;
        }

        h2 {
            margin-top: 0;
            font-size: 18px;
        }

        label {
            display: block;
            margin: 10px 0 4px;
            font-size: 13px;
            font-weight: bold;
        }

        input,
        textarea,
        select {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid #cfcfcf;
            border-radius: 8px;
            background: #ffffff;
            color: #333;
            height: 40px;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }

        textarea {
            min-height: 80px;
            height: auto;
            resize: vertical;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row>div {
            flex: 1;
            min-width: 0;
        }

        .select-wrap {
            position: relative;
        }

        .select-wrap select {
            padding-right: 34px;
        }

        .select-wrap::after {
            content: "▾";
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #666;
            font-size: 14px;
        }

        button {
            margin-top: 14px;
            margin-bottom: 6px;
            width: 100%;
            padding: 11px 12px;
            border: 0;
            border-radius: 8px;
            background: #a80000;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }

        .subtle {
            font-size: 12px;
            color: #666;
            margin-top: 14px;
            margin-bottom: 10px;
            padding-left: 2px;
        }

        .msg {
            margin-top: 12px;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
        }

        .msg.success {
            display: block;
            background: #e7f7ee;
            color: #1f6b3b;
        }

        .msg.error {
            display: block;
            background: #fdeaea;
            color: #8b1e1e;
        }

        .hidden {
            display: none;
        }

        .cancel-btn {
            background: #555;
            margin-top: 8px;
        }

        .cancel-btn:hover {
            background: #333;
        }
    </style>
</head>

<body>
    <h2>Edit Reservation</h2>

    <label>Reservation ID or Phone</label>
    <input id="searchValue" placeholder="e.g. ABC1234 or 91234567">
    <button type="button" id="loadBtn">Load Reservation</button>

    <div id="formWrap" class="hidden">
        <div class="subtle" id="reservationInfo"></div>

        <form id="editForm">
            <input type="hidden" name="rowNumber" id="rowNumber">

            <div class="row">
                <div>
                    <label>First Name</label>
                    <input name="firstName" id="firstName" required>
                </div>
                <div>
                    <label>Last Name</label>
                    <input name="lastName" id="lastName" required>
                </div>
            </div>

            <label>Email</label>
            <input name="email" id="email" type="email">

            <label>Phone</label>
            <input name="phone" id="phone" required>

            <div class="row">
                <div>
                    <label>Date</label>
                    <input name="date" id="dateInput" type="date" required>
                </div>
                <div>
                    <label>Time</label>
                    <div class="select-wrap">
                        <select name="time" id="timeSelect" required>
                            <option value="">Select a time</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="row">
                <div>
                    <label>Adults</label>
                    <input name="adults" id="adults" type="number" min="0" required>
                </div>
                <div>
                    <label>Children</label>
                    <input name="children" id="children" type="number" min="0" required>
                </div>
            </div>

            <label>Additional Request</label>
            <textarea name="notes" id="notes"></textarea>

            <button type="submit" id="saveBtn">Save Changes</button>
            <button type="button" id="cancelBtn" class="cancel-btn">Cancel Reservation</button>
        </form>
    </div>

    <div id="msg" class="msg"></div>

    <script>
        const loadBtn = document.getElementById("loadBtn");
        const saveBtn = document.getElementById("saveBtn");
        const searchValue = document.getElementById("searchValue");
        const formWrap = document.getElementById("formWrap");
        const editForm = document.getElementById("editForm");
        const msg = document.getElementById("msg");
        const reservationInfo = document.getElementById("reservationInfo");
        const dateInput = document.getElementById("dateInput");
        const timeSelect = document.getElementById("timeSelect");
        const cancelBtn = document.getElementById("cancelBtn");

        function showMessage(text, type) {
            msg.textContent = text;
            msg.className = "msg " + type;
        }

        function clearMessage() {
            msg.className = "msg";
            msg.textContent = "";
        }

        function setTimeOptions(times, selectedValue) {
            timeSelect.innerHTML = "";

            if (!times || !times.length) {
                const opt = document.createElement("option");
                opt.value = "";
                opt.textContent = "No available times";
                timeSelect.appendChild(opt);
                return;
            }

            const placeholder = document.createElement("option");
            placeholder.value = "";
            placeholder.textContent = "Select a time";
            timeSelect.appendChild(placeholder);

            times.forEach(function (time) {
                const opt = document.createElement("option");
                opt.value = time;
                opt.textContent = time;
                if (selectedValue && selectedValue === time) {
                    opt.selected = true;
                }
                timeSelect.appendChild(opt);
            });
        }

        function loadTimes(dateValue, selectedTime) {
            timeSelect.innerHTML = '<option value="">Loading...</option>';

            google.script.run
                .withSuccessHandler(function (times) {
                    setTimeOptions(times, selectedTime);
                })
                .withFailureHandler(function (err) {
                    timeSelect.innerHTML = '<option value="">Unable to load times</option>';
                    showMessage(err.message || "Failed to load available times.", "error");
                })
                .getAvailableTimesForSidebar(dateValue);
        }

        loadBtn.addEventListener("click", function () {
            clearMessage();
            loadBtn.disabled = true;
            formWrap.classList.add("hidden");

            google.script.run
                .withSuccessHandler(function (res) {
                    loadBtn.disabled = false;

                    const r = res.reservation;
                    document.getElementById("rowNumber").value = res.rowNumber;
                    document.getElementById("firstName").value = r.firstName || "";
                    document.getElementById("lastName").value = r.lastName || "";
                    document.getElementById("email").value = r.email || "";
                    document.getElementById("phone").value = r.phone || "";
                    document.getElementById("dateInput").value = r.date || "";
                    document.getElementById("adults").value = r.adults || 0;
                    document.getElementById("children").value = r.children || 0;
                    document.getElementById("notes").value = r.notes || "";

                    reservationInfo.textContent = "Reservation ID: " + (r.id || "");
                    formWrap.classList.remove("hidden");

                    loadTimes(r.date, r.time);
                })
                .withFailureHandler(function (err) {
                    loadBtn.disabled = false;
                    showMessage(err.message || "Unable to load reservation.", "error");
                })
                .findReservationForStaffEdit(searchValue.value);
        });

        dateInput.addEventListener("change", function () {
            if (!dateInput.value) return;
            loadTimes(dateInput.value, "");
        });

        editForm.addEventListener("submit", function (e) {
            e.preventDefault();
            clearMessage();
            saveBtn.disabled = true;

            const data = Object.fromEntries(new FormData(editForm).entries());

            google.script.run
                .withSuccessHandler(function (res) {
                    saveBtn.disabled = false;
                    showMessage(res.message || "Reservation updated successfully.", "success");
                })
                .withFailureHandler(function (err) {
                    saveBtn.disabled = false;
                    showMessage(err.message || "Unable to update reservation.", "error");
                })
                .updateReservationByStaff(data);
        });

        cancelBtn.addEventListener("click", function () {

            const confirmCancel = confirm("Are you sure you want to cancel this reservation?");
            if (!confirmCancel) return;

            const rowNumber = document.getElementById("rowNumber").value;

            google.script.run
                .withSuccessHandler(function (res) {
                    showMessage("Reservation cancelled successfully.", "success");
                    formWrap.classList.add("hidden");
                })
                .withFailureHandler(function (err) {
                    showMessage(err.message || "Unable to cancel reservation.", "error");
                })
                .cancelReservationByStaff(rowNumber);
        });
    </script>
</body>

</html>
